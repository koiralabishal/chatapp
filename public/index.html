<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgroMart AI - RAG PDF Assistant</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #10b981;
        --primary-dark: #059669;
        --bg: #0f172a;
        --surface: #1e293b;
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --border: #334155;
        --radius: 12px;
        --header-height: 70px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      header {
        height: var(--header-height);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 2rem;
        background: rgba(30, 41, 59, 0.8);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        z-index: 10;
      }

      .logo {
        font-family: "Outfit", sans-serif;
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--primary);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.875rem;
        color: var(--text-muted);
      }

      .status-dot {
        width: 8px;
        height: 8px;
        background: var(--primary);
        border-radius: 50%;
        box-shadow: 0 0 8px var(--primary);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.4;
        }
      }

      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: 900px;
        width: 100%;
        margin: 0 auto;
        position: relative;
        overflow: hidden;
      }

      #chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        scroll-behavior: smooth;
      }

      #chat-container::-webkit-scrollbar {
        width: 6px;
      }

      #chat-container::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 10px;
      }

      .message {
        max-width: 80%;
        padding: 1rem 1.25rem;
        border-radius: var(--radius);
        line-height: 1.5;
        font-size: 0.95rem;
        position: relative;
        animation: fadeIn 0.3s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .user-message {
        align-self: flex-end;
        background: var(--primary);
        color: white;
        border-bottom-right-radius: 4px;
      }

      .ai-message {
        align-self: flex-start;
        background: #e2e8f0; /* Lighter background for black text readability */
        color: #1e293b;
        border-bottom-left-radius: 4px;
        border: 1px solid var(--border);
      }

      .ai-message::before {
        content: "AgroMart AI";
        display: block;
        font-size: 0.75rem;
        color: var(--primary);
        font-weight: 600;
        margin-bottom: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .input-area {
        padding: 1.5rem 2rem;
        background: var(--bg);
        border-top: 1px solid var(--border);
      }

      .input-wrapper {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 30px;
        display: flex;
        align-items: center;
        padding: 0.5rem 1rem;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }

      .input-wrapper:focus-within {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
      }

      input {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--text);
        padding: 0.75rem 1rem;
        font-family: inherit;
        font-size: 1rem;
        outline: none;
      }

      button {
        background: var(--primary);
        color: white;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.2s,
          transform 0.1s;
      }

      button:hover {
        background: var(--primary-dark);
      }

      button:active {
        transform: scale(0.95);
      }

      button svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .typing-dots {
        display: inline-flex;
        gap: 4px;
        align-items: center;
        height: 20px;
      }

      .typing-dots span {
        width: 8px;
        height: 8px;
        background: var(--primary);
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out both;
      }

      .typing-dots span:nth-child(1) {
        animation-delay: -0.32s;
      }
      .typing-dots span:nth-child(2) {
        animation-delay: -0.16s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0);
        }
        40% {
          transform: scale(1);
        }
      }

      .highlight-source {
        background: rgba(16, 185, 129, 0.15);
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
        border-left: 3px solid var(--primary);
        color: var(--primary);
        font-weight: 500;
        display: block;
        margin-bottom: 0.75rem;
        font-size: 0.85rem;
      }

      .highlight-text {
        color: #000; /* Bold black letter */
        font-weight: 700;
      }

      code {
        background: rgba(0, 0, 0, 0.3);
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
        font-family: monospace;
      }

      pre {
        background: rgba(0, 0, 0, 0.3);
        padding: 1rem;
        border-radius: 8px;
        overflow-x: auto;
        margin: 0.5rem 0;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
          ></path>
        </svg>
        AgroMart AI
      </div>
      <div class="status">
        <div class="status-dot"></div>
        System Online
      </div>
    </header>

    <main>
      <div id="chat-container">
        <div class="message ai-message">
          Hello! I am your AgroMart AI assistant. I can help you with
          agricultural questions based on your uploaded PDF documents. How can I
          assist you today?
        </div>
      </div>

      <div class="input-area">
        <form id="chat-form">
          <div class="input-wrapper">
            <input
              type="text"
              id="user-input"
              placeholder="Ask about your agriculture guides..."
              autocomplete="off"
            />
            <button type="submit" id="send-btn">
              <svg viewBox="0 0 24 24">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </form>
      </div>
    </main>

    <script>
      const chatContainer = document.getElementById("chat-container");
      const chatForm = document.getElementById("chat-form");
      const userInput = document.getElementById("user-input");
      const sendBtn = document.getElementById("send-btn");

      // Use relative path for Vercel, specific URL for local dev
      const API_URL =
        window.location.protocol === "file:" ||
        window.location.port === "5500" ||
        window.location.port === "8001"
          ? "http://127.0.0.1:8001/chat"
          : "/chat";

      function appendMessage(text, isUser = false) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${isUser ? "user-message" : "ai-message"}`;

        if (isUser) {
          msgDiv.textContent = text;
        } else if (text === "") {
          // Initial empty AI message with typing dots
          const dots = document.createElement("div");
          dots.className = "typing-dots";
          dots.innerHTML = "<span></span><span></span><span></span>";
          msgDiv.appendChild(dots);
        } else {
          msgDiv.innerHTML = formatAIResponse(text);
        }

        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return msgDiv;
      }

      function formatAIResponse(text) {
        // Remove markdown symbols like *** and replace with highlight tags
        let html = text.replace(/\*\*\*/g, "");

        // Highlight the "Source" part if present
        html = html.replace(
          /^(According to our official guides\.\.\.|\[Source:.*?\])/i,
          '<span class="highlight-source">$1</span>',
        );

        // Replace bold **text** with highlights
        html = html.replace(
          /\*\*(.*?)\*\*/g,
          '<span class="highlight-text">$1</span>',
        );

        // Handle newlines
        html = html.replace(/\n/g, "<br>");

        return html;
      }

      async function handleChat(e) {
        e.preventDefault();
        const message = userInput.value.trim();
        if (!message) return;

        // User message
        appendMessage(message, true);
        userInput.value = "";

        // Prepare AI response container with dots
        const aiMsgDiv = appendMessage("", false);

        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message }),
          });

          if (!response.ok) throw new Error("Failed to connect to AI service");
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let accumulatedText = "";
          let dotsRemoved = false;

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value, { stream: true });
            accumulatedText += chunk;

            if (!dotsRemoved && accumulatedText.trim().length > 0) {
              aiMsgDiv.innerHTML = ""; // Remove dots only when text starts
              dotsRemoved = true;
            }

            if (dotsRemoved) {
              aiMsgDiv.innerHTML = formatAIResponse(accumulatedText);
              chatContainer.scrollTop = chatContainer.scrollHeight;
            }
          }
        } catch (error) {
          console.error("Error:", error);
          aiMsgDiv.innerHTML =
            '<span class="highlight-text">Error:</span> Failed to process request. Check if backend is running.';
        }
      }

      chatForm.addEventListener("submit", handleChat);

      // Initial check for backend
      fetch("http://127.0.0.1:8001/")
        .then((r) => r.json())
        .then((data) => {
          console.log("Backend status:", data);
        })
        .catch((err) => {
          console.warn("Backend seems offline:", err);
        });
    </script>
  </body>
</html>
